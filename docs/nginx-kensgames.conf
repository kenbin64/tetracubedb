# kensgames.com — nginx site config
# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name kensgames.com www.kensgames.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kensgames.com www.kensgames.com;

    ssl_certificate     /etc/ssl/kensgames/origin.pem;
    ssl_certificate_key /etc/ssl/kensgames/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /var/www/kensgames.com/public;
    index index.html;

    access_log /var/www/kensgames.com/logs/access.log;
    error_log  /var/www/kensgames.com/logs/error.log;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # WebSocket lobby server (port 8765)
    location /ws {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Auth & API (port 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-lived cache for versioned libs
    location ~* \.(js|css|wasm|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Docs directory — static HTML
    location /docs/ {
        alias /var/www/kensgames.com/public/docs/;
        try_files $uri $uri/ =404;
    }

    # Everything else — static files
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
