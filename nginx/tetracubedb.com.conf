# ─────────────────────────────────────────────────────────────────────────────
# TETRACUBEDB — nginx virtual host
# Domain : tetracubedb.com  (172.81.62.217)
# SSL    : Managed by Certbot / Let's Encrypt
# Upstream: TetracubeDB Node server on port 4747
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tetracubedb.com www.tetracubedb.com;

    location /.well-known/acme-challenge/ {
        root /var/www/tetracubedb.com/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + WebSocket proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tetracubedb.com www.tetracubedb.com;

    # ── SSL (certbot will update these paths) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tetracubedb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tetracubedb.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options   nosniff;
    add_header X-Frame-Options          DENY;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # ── Access log ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/tetracubedb.access.log;
    error_log  /var/log/nginx/tetracubedb.error.log;

    # ── Static landing page ────────────────────────────────────────────────
    root /var/www/tetracubedb.com/public;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ── REST API proxy ─────────────────────────────────────────────────────
    location ~ ^/(v1|admin|health)(/|$) {
        proxy_pass         http://127.0.0.1:4747;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Rate limiting (protect admin endpoints more strictly)
        limit_req zone=api burst=40 nodelay;
    }

    # ── WebSocket proxy (/ws) ──────────────────────────────────────────────
    location /ws {
        proxy_pass          http://127.0.0.1:4747;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;    # keep WebSocket connections alive 1h
        proxy_send_timeout  3600s;
    }
}

# ── Rate limit zones (add to http {} block in nginx.conf if not present) ──────
# limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
